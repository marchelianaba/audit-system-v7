# Profil Satker untuk evaluasi semantic anomaly CACM — sample PoC
# ====================================================
# Status: DRAFT pre-implementation. Lihat docs/rencana-cacm-kriteria.html §2.5.1.
# Dipakai oleh kriteria PBJ-TUPOKSI-MATCH untuk menilai apakah paket pengadaan
# sesuai tupoksi Direktorat.
# ====================================================

kode: wasdig
nama: "Direktorat Jenderal Pengawasan Ruang Digital"
kementerian: "Komunikasi dan Digital"
sumber_profil: "Renstra Komdigi 2025-2029 + Permenkomdigi 1/2025"
revisi: "2026-Q2-draft"

# Tupoksi inti — string ringkas, dipakai sebagai token untuk match
tupoksi:
  - "Pengawasan konten digital"
  - "Sertifikasi elektronik (PSrE) — trust anchor nasional"
  - "Tanda tangan elektronik (TTE)"
  - "Penanda waktu elektronik (TSA)"
  - "Manajemen risiko ruang digital"
  - "Pengawasan PSE (Penyelenggara Sistem Elektronik)"
  - "Audit kepatuhan keamanan informasi"

# Kategori barang/jasa yang WAJAR direktorat ini procure
pengadaan_wajar:
  infrastruktur_keamanan:
    - "lisensi firewall (next-gen)"
    - "monitoring tools (SIEM, IDS/IPS, EDR)"
    - "server / storage untuk PSrE"
    - "HSM (hardware security module)"
    - "PKI infrastructure"
    - "load balancer"
    - "DDoS protection"
  jasa_konsultansi:
    - "audit keamanan siber"
    - "kajian regulasi PSE/TTE"
    - "penetration testing"
    - "ISO 27001 / SNI ISO 27001 implementation"
  pelatihan:
    - "sertifikasi siber (CISA, CISM, CISSP, CEH)"
    - "ISO 27001 awareness"
    - "pengawasan konten dan moderasi"
    - "PKI engineering"
  langganan_software:
    - "threat intelligence feed"
    - "vulnerability scanner"
  perjalanan_dinas:
    - "rapat koordinasi ruang digital"
    - "supervisi penyedia PSE"

# Anti-pattern: jenis pengadaan yang ANEH/CURIGA bila muncul di direktorat ini
# Auditor PT/PM workshop kalibrasi.
pengadaan_anomali_jelas:
  - "pelatihan tata boga / kuliner"
  - "renovasi gedung non-data-center"
  - "konsultansi pemasaran ritel"
  - "pengadaan kendaraan operasional > 5 unit"
  - "perabot kantor mewah"
  - "event hiburan / corporate gathering"
  - "pengadaan ATK skala besar (di luar kebutuhan normal)"

# Pengecualian (whitelist) — pengadaan yang sekilas anomali tapi sebenarnya wajar
pengecualian:
  - keyword: "konsultansi tata kelola TI"
    alasan: "Tata kelola TI termasuk tupoksi pengawasan keamanan informasi"
  - keyword: "outsourcing operator monitoring"
    alasan: "Penyediaan SDM operator 24/7 untuk SOC adalah praktek standar"
